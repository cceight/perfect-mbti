<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文字表示テスト</title>

<style>

@font-face{
  font-family:"calligraphr";
  src:url("fonts/Calligraphr-Regular.otf") format("opentype");
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#box{
  display:flex;
  gap:10px;
}

#output{
  margin-top:20px;
  font-size:60px;
  font-family:"calligraphr";
  text-align:center;
}

</style>
</head>
<body>

<div>
  <div id="box">
    <input type="text" id="text">
    <button onclick="showText()">出力</button>
  </div>

  <div id="output"></div>
</div>

<script>

function showText(){
  const t = document.getElementById("text").value;
  document.getElementById("output").textContent = t;
}

</script>

</body>
</html>
