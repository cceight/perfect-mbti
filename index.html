<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字入り画像ジェネレーター</title>

  <!-- ★ 重要: pako を UPNG より先に読み込む -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --border: #2a2a32;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --wood: #8b5e3c;
      --wood-light: #c8895a;
      --text: #e8e4dc;
      --muted: #6b6878;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--text);
      opacity: 0.9;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    label {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      padding: 0.6rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--gold); }

    .btn-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-preview {
      background: var(--border);
      color: var(--text);
    }
    .btn-wood {
      background: linear-gradient(135deg, var(--wood), var(--wood-light));
      color: #fff;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #1a1200;
    }

    #preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    #preview-wrap.visible { display: flex; }

    #preview-canvas {
      border-radius: 8px;
      max-width: 100%;
      border: 1px solid var(--border);
    }

    #status {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
      text-align: center;
    }
    #status.error { color: #e05555; }
    #status.ok    { color: #5cb85c; }

    .note {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
  </style>
</head>
<body>

<h1>文字入り画像ジェネレーター</h1>

<div class="card">
  <label for="kana-input">ひらがなを入力</label>
  <input type="text" id="kana-input" placeholder="あいうえお" value="あ">

  <div class="btn-row">
    <button class="btn-preview" onclick="showPreview()">👁 プレビュー</button>
    <button class="btn-wood"    onclick="downloadWood()">🪵 Wood PNG</button>
    <button class="btn-gold"    id="btn-gold" onclick="downloadGold()">✨ Gold APNG</button>
  </div>

  <p id="status">準備完了</p>

  <div id="preview-wrap">
    <canvas id="preview-canvas" width="480" height="480"></canvas>
  </div>

  <p class="note">
    ※ フォント: <code>fonts/Calligraphr-Regular.otf</code><br>
    ※ 背景: <code>images/wood.png</code> / <code>images/gold.png</code><br>
    ※ APNG の各フレームに文字を合成してダウンロードします。
  </p>
</div>

<script>
// ─────────────────────────────────────────────
//  設定
// ─────────────────────────────────────────────
const FONT_URL  = 'fonts/Calligraphr-Regular.otf';
const FONT_NAME = 'CalligraphrRegular';
const WOOD_URL  = 'images/wood.png';
const GOLD_URL  = 'images/gold.png';
const CANVAS_W  = 480;
const CANVAS_H  = 480;
const FONT_SIZE = 96; // px（必要に応じて調整）

// ─────────────────────────────────────────────
//  フォントの事前ロード
// ─────────────────────────────────────────────
let fontReady = false;

async function loadFont() {
  try {
    const font = new FontFace(FONT_NAME, `url(${FONT_URL})`);
    await font.load();
    document.fonts.add(font);
    fontReady = true;
    console.log('フォント読み込み完了');
  } catch (e) {
    console.warn('カスタムフォントの読み込みに失敗しました。システムフォントを使用します:', e);
    // フォントがなくてもシステムフォントで続行
    fontReady = true;
  }
}

// ─────────────────────────────────────────────
//  ユーティリティ: URL → ArrayBuffer
// ─────────────────────────────────────────────
async function fetchBuffer(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`画像の取得に失敗: ${url} (${res.status})`);
  return res.arrayBuffer();
}

// ─────────────────────────────────────────────
//  ユーティリティ: Canvas に背景 + 文字を描画
// ─────────────────────────────────────────────
function drawTextOnCanvas(canvas, imgSrc, text) {
  return new Promise((resolve, reject) => {
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.drawImage(img, 0, 0, CANVAS_W, CANVAS_H);
      drawText(ctx, text);
      resolve();
    };
    img.onerror = () => reject(new Error('画像の描画に失敗しました'));
    img.src = imgSrc;
  });
}

function drawText(ctx, text) {
  const fontFamily = fontReady ? `"${FONT_NAME}", serif` : 'serif';
  ctx.font        = `${FONT_SIZE}px ${fontFamily}`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';

  // 影でくっきり見せる
  ctx.shadowColor  = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur   = 8;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, CANVAS_W / 2, CANVAS_H / 2);

  // 影をリセット
  ctx.shadowColor  = 'transparent';
  ctx.shadowBlur   = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}

// ─────────────────────────────────────────────
//  ステータス表示
// ─────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = type;
}

// ─────────────────────────────────────────────
//  プレビュー（wood.png ベース）
// ─────────────────────────────────────────────
async function showPreview() {
  const text   = document.getElementById('kana-input').value || '　';
  const canvas = document.getElementById('preview-canvas');
  try {
    setStatus('プレビュー生成中…');
    await loadFont();
    await drawTextOnCanvas(canvas, WOOD_URL, text);
    document.getElementById('preview-wrap').classList.add('visible');
    setStatus('プレビュー表示中', 'ok');
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    console.error(e);
  }
}

// ─────────────────────────────────────────────
//  Wood PNG ダウンロード
// ─────────────────────────────────────────────
async function downloadWood() {
  const text = document.getElementById('kana-input').value || '　';
  try {
    setStatus('Wood PNG 生成中…');
    await loadFont();

    const canvas = document.createElement('canvas');
    canvas.width  = CANVAS_W;
    canvas.height = CANVAS_H;
    await drawTextOnCanvas(canvas, WOOD_URL, text);

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      triggerDownload(url, 'wood_text.png');
      URL.revokeObjectURL(url);
      setStatus('Wood PNG ダウンロード完了！', 'ok');
    }, 'image/png');
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    console.error(e);
  }
}

// ─────────────────────────────────────────────
//  Gold APNG ダウンロード（メイン修正箇所）
// ─────────────────────────────────────────────
async function downloadGold() {
  // ── 事前チェック ──────────────────────────
  if (typeof UPNG === 'undefined') {
    setStatus('エラー: UPNG.js が読み込まれていません', 'error');
    return;
  }
  if (typeof pako === 'undefined') {
    setStatus('エラー: pako が読み込まれていません（UPNG の依存ライブラリ）', 'error');
    return;
  }

  const text = document.getElementById('kana-input').value || '　';
  const btn  = document.getElementById('btn-gold');
  btn.disabled = true;

  try {
    setStatus('Gold APNG を読み込み中…');
    await loadFont();

    // 1. APNG のバイナリを取得
    const buf = await fetchBuffer(GOLD_URL);

    // 2. UPNG.js でフレームに分解
    setStatus('フレームを解析中…');
    const png    = UPNG.decode(buf);
    const frames = UPNG.toRGBA8(png); // 各フレームの RGBA8 Uint8Array の配列

    const width  = png.width;
    const height = png.height;
    const delays = png.frames.map(f => f.delay ?? 100); // フレームの表示時間(ms)

    setStatus(`フレーム合成中（全 ${frames.length} フレーム）…`);

    // 3. 各フレームに文字を描画して RGBA8 データを作成
    const canvas = document.createElement('canvas');
    canvas.width  = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    const newFrames = [];

    for (let i = 0; i < frames.length; i++) {
      // フレームの RGBA8 を ImageData に変換して Canvas に描画
      const imageData = new ImageData(new Uint8ClampedArray(frames[i]), width, height);
      ctx.putImageData(imageData, 0, 0);

      // 文字を重ねる
      drawText(ctx, text);

      // 描画結果を RGBA8 として取得
      const composited = ctx.getImageData(0, 0, width, height);
      newFrames.push(composited.data.buffer);

      if (i % 10 === 0) {
        setStatus(`フレーム合成中… ${i + 1} / ${frames.length}`);
        // UI をブロックしないよう 1 tick 譲る
        await new Promise(r => setTimeout(r, 0));
      }
    }

    // 4. UPNG.js で APNG として再エンコード
    setStatus('APNG エンコード中…');

    // delays は ms 単位 → UPNG は centi-seconds ではなく ms をそのまま受け取る
    // （UPNG.encode の第4引数は各フレームの delay ms の配列）
    const encoded = UPNG.encode(newFrames, width, height, 0, delays);

    // 5. ダウンロード
    const blob = new Blob([encoded], { type: 'image/png' });
    const url  = URL.createObjectURL(blob);
    triggerDownload(url, 'gold_text.png');
    URL.revokeObjectURL(url);

    setStatus('Gold APNG ダウンロード完了！', 'ok');
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
//  ダウンロードトリガー
// ─────────────────────────────────────────────
function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
}

// ─────────────────────────────────────────────
//  ページ読み込み時にフォントを先読み
// ─────────────────────────────────────────────
loadFont();
</script>
</body>
</html>
